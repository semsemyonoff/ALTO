{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALTO – Audio Library Transcode Organizer</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="/static/js/htmx.min.js" defer></script>
  <script src="/static/js/htmx-ext-sse.min.js" defer></script>
</head>
<body>
<div class="app-shell">

  <header class="app-header">
    <img class="app-logo" src="/static/logo.svg" alt="ALTO logo">
    <span class="app-title">ALTO</span>
    <span class="header-spacer"></span>
    <span id="scan-indicator" class="scan-status" style="display:none">
      <span class="spinner"></span> Scanning…
    </span>
    <button class="btn btn-ghost"
            id="scan-btn"
            onclick="altoTriggerScan()"
            title="Re-index all libraries">
      ↻ Re-index
    </button>
  </header>

  <aside class="app-sidebar">
    {{template "sidebar" .}}
  </aside>

  <main class="app-content" id="content-area">
    {{template "content" .}}
  </main>

</div>

<script>(function(){
  var scanIndic = document.getElementById('scan-indicator');
  var _scanES = null;

  function showScanIndic() { if (scanIndic) scanIndic.style.display = ''; }
  function hideScanIndic() { if (scanIndic) scanIndic.style.display = 'none'; }

  function refreshTree() {
    var sel = document.getElementById('library-select');
    if (sel && typeof htmx !== 'undefined') {
      htmx.ajax('GET', '/api/tree/' + sel.value + '/children', {target: '#tree-root', swap: 'innerHTML'});
    }
  }

  function startScanSSE() {
    if (_scanES) { _scanES.close(); }
    showScanIndic();
    _scanES = new EventSource('/api/scan/status');
    _scanES.addEventListener('idle', function() {
      _scanES.close(); _scanES = null; hideScanIndic();
    });
    _scanES.addEventListener('complete', function() {
      _scanES.close(); _scanES = null; hideScanIndic(); refreshTree();
    });
    _scanES.addEventListener('error', function() {
      _scanES.close(); _scanES = null; hideScanIndic();
    });
    _scanES.onerror = function() {
      if (_scanES) { _scanES.close(); _scanES = null; } hideScanIndic();
    };
  }

  // Exposed globally so directory.html can call it after post-transcode re-index.
  window.altoTriggerScan = function(libraryId) {
    var url = '/api/scan' + (libraryId ? '?library_id=' + encodeURIComponent(libraryId) : '');
    fetch(url, {method: 'POST'})
      .then(function() { startScanSSE(); })
      .catch(function() {});
  };
})();
</script>

</body>
</html>{{end}}
